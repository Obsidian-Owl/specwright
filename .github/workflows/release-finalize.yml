name: Release Finalize

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between ## [VERSION] and the next ## [
          sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[/d;p}" CHANGELOG.md > /tmp/release_notes.md

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin "v${VERSION}"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release_notes.md

      - name: Cleanup release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          git push origin --delete "$BRANCH" 2>/dev/null || true

  publish-npm:
    needs: tag-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag-and-release.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for OIDC support
        run: npm install -g npm@11

      - name: Build opencode adapter
        run: ./build/build.sh opencode

      - name: Check if version already published
        run: |
          VERSION=$(node -p "require('./dist/opencode/package.json').version")
          PUBLISHED=$(npm view @obsidian-owl/opencode-specwright@${VERSION} version 2>/dev/null || echo "")
          if [ -n "$PUBLISHED" ]; then
            echo "Version ${VERSION} already published, skipping"
            echo "SKIP_PUBLISH=true" >> "$GITHUB_ENV"
          fi

      - name: Publish to npm
        if: env.SKIP_PUBLISH != 'true'
        run: cd dist/opencode && npm publish --provenance --access public

  publish-codex-bundle:
    needs: tag-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag-and-release.outputs.version }}

      - name: Build Codex adapter
        run: ./build/build.sh codex

      - name: Create Codex release asset
        run: tar -czf specwright-codex.tar.gz -C dist codex

      - name: Validate Codex bundle manifest
        run: |
          tar -tzf specwright-codex.tar.gz | grep -q 'codex/.codex-plugin/plugin.json' || {
            echo "::error::Codex bundle is missing plugin manifest"
            exit 1
          }

      - name: Upload Codex release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.tag-and-release.outputs.version }}" \
            specwright-codex.tar.gz \
            --clobber
