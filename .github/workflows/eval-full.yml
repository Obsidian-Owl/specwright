name: Eval Full Weekly

on:
  schedule:
    - cron: '0 2 * * 0'  # Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runner:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    outputs:
      skill_exit: ${{ steps.run.outputs.skill_exit }}
      workflow_exit: ${{ steps.run.outputs.workflow_exit }}
      integration_exit: ${{ steps.run.outputs.integration_exit }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Claude Code OAuth token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Secret bound via env: block (not interpolated into shell) to avoid
          # the expression-injection pattern that GitHub Actions hardening
          # guide flags.
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is required for eval-full runs."
            echo "::error::This is the same token used by .github/workflows/claude-code-review.yml."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install eval framework deps
        run: pip install -r evals/requirements.txt

      - name: Install Claude CLI
        # See eval-smoke.yml for the supply-chain hardening rationale.
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh -o /tmp/claude-install.sh
          test -s /tmp/claude-install.sh
          head -1 /tmp/claude-install.sh | grep -qE '^#!' || {
            echo "::error::claude install.sh does not start with a shebang"
            exit 1
          }
          echo "claude install.sh SHA-256: $(shasum -a 256 /tmp/claude-install.sh | cut -d' ' -f1)"
          bash /tmp/claude-install.sh
          rm -f /tmp/claude-install.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Auth: CLAUDE_CODE_OAUTH_TOKEN uses the Claude Code subscription
      # (Pro/Max) instead of API credits. The `claude` CLI binary reads
      # this env var natively. Same auth path as claude-code-review.yml.
      - name: Run all suites
        id: run
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set +e

          python -m evals --suite skill --compare-to-baseline
          echo "skill_exit=$?" >> "$GITHUB_OUTPUT"

          python -m evals --suite workflow --compare-to-baseline
          echo "workflow_exit=$?" >> "$GITHUB_OUTPUT"

          python -m evals --suite integration --compare-to-baseline
          echo "integration_exit=$?" >> "$GITHUB_OUTPUT"

          set -e

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/
          retention-days: 30

  dispatcher:
    needs: runner
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # contents: write is required because eval-weekly-dispatch.sh's
      # improvement path creates a new branch, commits the refreshed
      # baseline files, and pushes the branch to the remote before
      # opening the PR. Without write access, `git push origin "$BRANCH"`
      # fails. See scripts/eval-weekly-dispatch.sh lines ~140-175.
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        # Fetch history so git diff/commit operations have a real base
        with:
          fetch-depth: 0

      - name: Download eval results
        uses: actions/download-artifact@v4
        with:
          name: eval-results
          path: evals/results/

      - name: Dispatch PR or issue
        env:
          GH_TOKEN: ${{ github.token }}
          SKILL_EXIT: ${{ needs.runner.outputs.skill_exit }}
          WORKFLOW_EXIT: ${{ needs.runner.outputs.workflow_exit }}
          INTEGRATION_EXIT: ${{ needs.runner.outputs.integration_exit }}
          EVAL_RESULTS_DIR: evals/results
        run: bash scripts/eval-weekly-dispatch.sh
