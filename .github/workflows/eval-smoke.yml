name: Eval Smoke

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: eval-smoke-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Check Claude Code OAuth token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Secret bound via env: block (not interpolated into shell) to avoid
          # the expression-injection pattern that GitHub Actions hardening
          # guide flags. Also safer if the secret ever contains shell
          # metacharacters.
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is required for eval smoke runs."
            echo "::error::This is the same token used by .github/workflows/claude-code-review.yml."
            echo "::error::Configure it via Repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install eval framework deps
        run: pip install -r evals/requirements.txt

      - name: Install Claude CLI
        # SUPPLY-CHAIN NOTE: this step downloads claude.ai/install.sh and
        # executes it. The same installer is implicitly trusted by
        # anthropics/claude-code-action@v1 which powers claude-code-review.yml
        # in this repo — so adding it here does not expand the trust surface.
        #
        # Hardening applied:
        # 1. Download to a local file first (don't pipe to bash)
        # 2. Verify it's non-empty and starts with a shebang (cheap sanity check)
        # 3. Log the SHA-256 to the run output so unexpected drift is visible
        #    in the workflow logs even if no alert fires
        # 4. Execute explicitly with bash
        #
        # Future hardening (tracked as backlog item): pin to a specific
        # release URL + verify a known SHA-256. The installer doesn't
        # currently publish a versioned URL or canonical hash.
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh -o /tmp/claude-install.sh
          test -s /tmp/claude-install.sh
          head -1 /tmp/claude-install.sh | grep -qE '^#!' || {
            echo "::error::claude install.sh does not start with a shebang"
            exit 1
          }
          echo "claude install.sh SHA-256: $(shasum -a 256 /tmp/claude-install.sh | cut -d' ' -f1)"
          bash /tmp/claude-install.sh
          rm -f /tmp/claude-install.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # --trials 3 implements the architect's multi-run flake mitigation.
      # 02b-1's aggregator mean-aggregates per eval, so 3 trials produce
      # a stable mean. Median would be a strict improvement and is
      # captured as a future optimization.
      #
      # Auth: CLAUDE_CODE_OAUTH_TOKEN uses the Claude Code subscription
      # (Pro/Max) instead of API credits. The `claude` CLI binary reads
      # this env var natively. Same auth path as claude-code-review.yml.
      - name: Run smoke evals
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          python -m evals --suite skill --smoke-only --trials 3 --compare-to-baseline

      - name: Find latest results dir
        id: find-results
        if: always()
        run: |
          # Use find instead of ls -td to handle non-alphanumeric filenames
          # safely (shellcheck SC2012). Sort by mtime, take last (newest).
          LATEST=$(find evals/results -maxdepth 1 -type d -name 'run-*' -printf '%T@ %p\n' 2>/dev/null \
                   | sort -n | tail -1 | cut -d' ' -f2-)
          echo "results_dir=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment
        if: always() && steps.find-results.outputs.results_dir != ''
        env:
          GH_TOKEN: ${{ github.token }}
          EVAL_RUN_DIR: ${{ steps.find-results.outputs.results_dir }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/post-eval-comment.sh

  fork-skip:
    if: github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Skip note
        run: |
          echo "::notice::Eval smoke runs require repository secrets; PRs from forks are reviewed manually before merging."
