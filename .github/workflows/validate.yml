name: Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          PLUGIN_VERSION=$(jq -r '.version' adapters/claude-code/.claude-plugin/plugin.json)
          MARKETPLACE_VERSION=$(jq -r '.plugins[0].version' adapters/claude-code/.claude-plugin/marketplace.json)

          OPENCODE_VERSION=$(jq -r '.version' adapters/opencode/package.json)

          if [ "$PLUGIN_VERSION" != "$MARKETPLACE_VERSION" ]; then
            echo "::error::Version mismatch: plugin.json ($PLUGIN_VERSION) != marketplace.json ($MARKETPLACE_VERSION)"
            exit 1
          fi

          if [ "$PLUGIN_VERSION" != "$OPENCODE_VERSION" ]; then
            echo "::error::Version mismatch: plugin.json ($PLUGIN_VERSION) != opencode package.json ($OPENCODE_VERSION)"
            exit 1
          fi

          echo "All versions match: $PLUGIN_VERSION"

  skill-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SKILL.md frontmatter
        run: |
          ERRORS=0
          for file in core/skills/*/SKILL.md; do
            [ -f "$file" ] || continue

            # Extract frontmatter (between first two --- lines)
            FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$file" | sed '1d;$d')

            # Check for name field
            if ! echo "$FRONTMATTER" | grep -q '^name:'; then
              echo "::error file=$file::Missing 'name' in frontmatter"
              ERRORS=$((ERRORS + 1))
            fi

            # Check for description field
            if ! echo "$FRONTMATTER" | grep -q '^description:'; then
              echo "::error file=$file::Missing 'description' in frontmatter"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "::error::Found $ERRORS frontmatter issue(s)"
            exit 1
          fi

          echo "All SKILL.md files have valid frontmatter"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run build
        run: ./build/build.sh claude-code
      - name: Verify output structure
        run: |
          EXPECTED="agents CLAUDE.md hooks protocols README.md skills"
          ACTUAL=$(ls dist/claude-code/ | grep -v '^\.' | sort | tr '\n' ' ' | sed 's/ $//')
          EXPECTED_SORTED=$(echo "$EXPECTED" | tr ' ' '\n' | sort | tr '\n' ' ' | sed 's/ $//')

          if [ "$ACTUAL" != "$EXPECTED_SORTED" ]; then
            echo "::error::Unexpected dist/claude-code/ structure"
            echo "Expected: $EXPECTED_SORTED"
            echo "Actual:   $ACTUAL"
            exit 1
          fi

          # Verify .claude-plugin exists (hidden dir)
          if [ ! -d "dist/claude-code/.claude-plugin" ]; then
            echo "::error::Missing dist/claude-code/.claude-plugin/"
            exit 1
          fi

          echo "Build output structure verified"

  test-claude-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Claude Code build tests
        run: tests/test-claude-code-build.sh
      - name: Run hook behavioral tests
        run: tests/test-hooks.sh
      - name: Run stage enforcement tests
        run: tests/test-stage-enforcement.sh

  test-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install eval dependencies
        run: pip install pytest pyyaml
      - name: Run eval framework tests
        run: python -m pytest evals/tests/ -v --ignore=evals/tests/test_aggregator.py

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --no-banner --verbose --redact --source .
